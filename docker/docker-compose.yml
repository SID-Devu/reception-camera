version: '3.8'

services:
  reception-camera:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../app:/opt/reception-camera/app
      - ../data:/opt/reception-camera/data
      - ../models:/opt/reception-camera/models
    devices:
      - /dev/video0:/dev/video0  # USB camera passthrough
    environment:
      - CAMERA_RESOLUTION=1280x720
      - RECOGNITION_THRESHOLD=0.6
    restart: unless-stopped

  reception-camera-gpu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu
    ports:
      - "8001:8000"
    volumes:
      - ../app:/opt/reception-camera/app
      - ../data:/opt/reception-camera/data
      - ../models:/opt/reception-camera/models
    devices:
      - /dev/video0:/dev/video0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - CAMERA_RESOLUTION=1280x720
      - RECOGNITION_THRESHOLD=0.6
    restart: unless-stopped
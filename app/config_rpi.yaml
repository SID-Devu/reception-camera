# ============================================================
# Reception Greeter – Raspberry Pi Optimised Configuration
# ============================================================
# Auto-generated profile for Raspberry Pi 3/4/5.
# Tuned for lower CPU/RAM: lighter model, smaller resolution,
# fewer detection passes.
# ============================================================

camera:
  # "auto" = auto-discover best available camera (USB, CSI, or RTSP)
  source: "auto"
  width: 800
  height: 600
  fps: 20
  detect_every_n_frames: 5
  # GStreamer backend for CSI camera (auto-configured if CSI detected)
  use_gstreamer: true

face_detection:
  min_confidence: 0.45
  min_face_size: 50
  # buffalo_s is much lighter than buffalo_l (~4x faster on ARM)
  model_pack: "buffalo_s"

recognition:
  similarity_threshold: 0.40
  consecutive_frames_required: 3

tracking:
  max_link_distance: 120
  max_frames_missing: 12

door_line:
  orientation: "horizontal"
  position: 0.50
  inside_direction: "below"

greeting:
  mode: "presence"
  cooldown_seconds: 300
  entry_template: "Hey {name}, welcome! Have a nice day."
  exit_template: "Bye {name}, see you later!"
  unknown_entry: "Hello! Please check in at reception."
  unknown_exit: "Goodbye! Have a nice day."

enrollment:
  num_samples: 15
  min_face_width_px: 50
  max_yaw_degrees: 45
  max_pitch_degrees: 45
  min_blur_laplacian: 20.0
  min_brightness: 25
  max_brightness: 240

tts:
  engine: "pyttsx3"
  rate: 160
  volume: 0.9
  # Auto-detect speaker. If no speaker found, TTS is silently disabled.
  auto_detect_speaker: true

database:
  path: "../data/faces.db"

logging:
  level: "INFO"
  file: "../logs/reception.log"
  audit_file: "../logs/audit.log"

performance:
  detection_resize_width: 480
  use_gpu: false
  # Number of OpenCV threads (match RPi core count)
  num_threads: 4

hardware:
  # Auto-detect platform, cameras, and speakers at startup
  auto_detect: true
  # Scan local network for RTSP/CCTV cameras
  scan_network_cameras: true
  # Explicit RTSP camera URLs (optional)
  rtsp_urls: []
